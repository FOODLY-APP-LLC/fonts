<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FOODLY Font CDN Test</title>
    <link rel="preconnect" href="https://fonts.foodlyapp.ge" crossorigin>
    <link rel="preload" href="https://fonts.foodlyapp.ge/v1/fonts/FiraGO/Roman/FiraGO-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="https://fonts.foodlyapp.ge/v1/fonts.css">
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: 'FiraGO', sans-serif;
            background: #fcfaf7;
            color: #201a18;
        }

        h1 {
            font-weight: 700;
        }

        .medium {
            font-weight: 500;
        }

        .regular {
            font-weight: 400;
        }

        .decorative {
            font-family: 'Dachi the Lynx', cursive;
            font-size: 2rem;
        }
    </style>
</head>
<body>
    <h1>FiraGO Bold 700</h1>
    <p class="medium">FiraGO Medium 500</p>
    <p class="regular">FiraGO Regular 400</p>
    <p style="font-family: 'DejaVu Sans', sans-serif; font-weight: 700;">DejaVu Sans Bold 700</p>
    <p class="decorative">Dachi the Lynx Regular 400</p>
</body>
</html>
