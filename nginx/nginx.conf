server {
    listen 80;
    listen [::]:80;
    server_name fonts.foodly.live;

    root /var/www/fonts.foodly.live;
    index index.html;

    autoindex off;
    charset utf-8;
    etag on;
    server_tokens off;

    # Only safe read methods are exposed for this static asset host.
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
        default_type text/plain;
        return 200 "User-agent: *\nDisallow:\n";
    }

    location / {
        try_files $uri $uri/ =404;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Immutable caching for versioned static assets.
    location ~* ^/v[0-9]+/.+\.(css|woff2|woff|svg)$ {
        try_files $uri =404;

        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /index.html {
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~ /\. {
        deny all;
    }

    types {
        text/css css;
        font/woff woff;
        font/woff2 woff2;
        image/svg+xml svg svgz;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/css image/svg+xml;
    # Optional Brotli support. Enable only if the nginx Brotli module is installed.
    # brotli on;
    # brotli_comp_level 5;
    # brotli_static on;
    # brotli_types text/css image/svg+xml;
}
